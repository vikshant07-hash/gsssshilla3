<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<style>

/* ================= GLOBAL ================= */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background: linear-gradient(-45deg, #0f172a, #1e1b4b, #30125e, #0f172a);
  background-size: 400% 400%;
  animation: bgMove 12s ease infinite;
  padding: 20px;
}

/* animated background */
@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* floating glow */
body::before,
body::after {
  content: "";
  position: absolute;
  width: 280px;
  height: 280px;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.4;
  z-index: 0;
}

body::before {
  background: #a855f7;
  top: 10%;
  left: 10%;
  animation: float1 8s ease-in-out infinite;
}

body::after {
  background: #ec4899;
  bottom: 10%;
  right: 10%;
  animation: float2 10s ease-in-out infinite;
}

@keyframes float1 {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(40px); }
}

@keyframes float2 {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-40px); }
}

/* ================= RESET BOX ================= */

.box {
  position: relative;
  z-index: 1;

  width: 100%;
  max-width: 400px;

  padding: 30px;
  border-radius: 18px;

  background: rgba(15, 23, 42, 0.75);
  backdrop-filter: blur(15px);

  border: 1px solid rgba(255,255,255,0.08);

  box-shadow: 0 0 25px rgba(168, 85, 247, 0.4),
              0 0 40px rgba(236, 72, 153, 0.2);

  animation: fadeUp 0.6s ease;
}

/* entry animation */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ================= TITLE ================= */

.box h2 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 22px;

  background: linear-gradient(90deg, #a855f7, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ================= INPUT ================= */

.input-box {
  margin-bottom: 15px;
}

.input-box input {
  width: 100%;
  padding: 12px;

  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);

  background: rgba(255,255,255,0.06);
  color: #fff;

  font-size: 14px;
  outline: none;

  transition: 0.3s;
}

.input-box input:focus {
  border-color: #a855f7;
  box-shadow: 0 0 10px rgba(168,85,247,0.4);
  transform: scale(1.02);
}

/* ================= BUTTON ================= */

button {
  width: 100%;
  padding: 12px;

  border: none;
  border-radius: 10px;

  color: white;
  font-size: 15px;
  cursor: pointer;

  margin-top: 10px;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(168, 85, 247, 0.4);
}

button:active {
  transform: scale(0.98);
}

#sendResetBtn {
  background: linear-gradient(135deg, #0f766e, #14b8a6);
}

#changeBtn {
  background: linear-gradient(135deg, #a855f7, #ec4899);
  display: none;
}

/* ================= RESET SECTION ================= */

#resetSection {
  display: none;
}

/* ================= MESSAGE ================= */

.msg {
  text-align: center;
  margin-top: 15px;
  font-size: 14px;
  font-weight: bold;
}

.success { color: #22c55e; }
.error { color: #ef4444; }

/* ================= LOADER ================= */

.loader-box {
  display: none;
  text-align: center;
  margin-top: 15px;
}

.loader {
  width: 40px;
  height: 40px;

   border-radius: 45%;
  border: 4px solid rgba(238, 68, 68, 0.904);
  border-top: 4px solid #ffd82b;
    border-left: 4px solid rgb(91, 245, 30);
  border-bottom: 4px solid #1d5adf;

  animation: spin 0.9s linear infinite;
  margin: auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* ================= DISABLED BUTTON ================= */

button:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}

/* ================= RESPONSIVE ================= */

@media (max-width: 480px) {
  .box {
    padding: 20px;
  }

  .box h2 {
    font-size: 20px;
  }

  button {
    font-size: 14px;
  }
}


/* ================= BASE BUTTON ================= */
.back-btn {
  position: fixed;
  top: 15px;
  left: 15px;

  display: flex;
  align-items: center;
  gap: 6px;

  padding: 10px 14px;

  background: linear-gradient(135deg, #a855f7, #ec4899);
  color: #fff;

  font-size: 14px;
  font-weight: 500;
  text-decoration: none;

  border-radius: 10px;

  box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4);

  transition: all 0.3s ease;
  z-index: 999;
}

/* hover effect */
.back-btn:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 8px 20px rgba(236, 72, 153, 0.5);
}

/* ================= MOBILE ICON ONLY ================= */
@media (max-width: 600px) {
  .back-btn {
    width: 42px;
    height: 42px;

    padding: 0;

    justify-content: center;
    align-items: center;

    font-size: 18px;
    border-radius: 50%;
  }

  /* hide text on mobile */
  .back-btn {
    font-size: 0;
  }

  /* show only arrow icon */
  .back-btn::before {
    content: "⬅";
    font-size: 18px;
  }
}
</style>
</head>
<body>
  <a href="login.html" class="back-btn">⬅ Back to Login</a>

<div class="box">

  <h2>Forgot Password</h2>


  <!-- EMAIL -->

  <div class="input-box">

    <input
      type="email"
      id="email"
      placeholder="Registered Email"
    >

  </div>

  <!-- SEND OTP -->

  <button
    id="sendResetBtn"
    onclick="sendResetOTP()"
  >
    Send OTP
  </button>

  <!-- OTP SECTION -->

  <div id="resetSection">

    <div
      class="input-box"
      style="margin-top:15px;"
    >

      <input
        type="text"
        id="otp"
        placeholder="Enter OTP"
        maxlength="6"
      >

    </div>

    <div class="input-box">

      <input
        type="password"
        id="newPassword"
        placeholder="New Password"
      >

    </div>

    <button
      id="changeBtn"
      onclick="changePassword()"
    >
      Change Password
    </button>

  </div>

  <!-- LOADER -->

  <div class="loader-box" id="loader">

    <div class="loader"></div>

    <p style="color:#ffffff; font-size:14px; margin-top:10px;">
  Please wait...
</p>

  </div>

  <!-- MESSAGE -->

  <div class="msg" id="msg"></div>

</div>

<script>
/* ================= MESSAGE ================= */

function showMessage(text, type){

  const msg = document.getElementById("msg");
  msg.innerText = text;

  msg.className = "msg " + (type === "success" ? "success" : "error");
}

/* ================= LOADER ================= */

function showLoader(){
  document.getElementById("loader").style.display = "block";
}

function hideLoader(){
  document.getElementById("loader").style.display = "none";
}

/* ================= EMAIL VALIDATION ================= */

function isValidEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

/* ================= SEND RESET OTP ================= */

async function sendResetOTP(){

  const email = document.getElementById("email").value.trim();

  if(!email){
    showMessage("Enter Email","error");
    return;
  }

  if(!isValidEmail(email)){
    showMessage("Invalid Email","error");
    return;
  }

  const btn = document.getElementById("sendResetBtn");
  btn.disabled = true;
  btn.innerText = "Sending...";

  showLoader();

  try {

    const res = await fetch("https://gsssshilla.onrender.com/send-reset-otp", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if(data.success){

      showMessage("OTP Sent Successfully","success");

      document.getElementById("resetSection").style.display = "block";
      document.getElementById("changeBtn").style.display = "block";

      btn.innerText = "OTP Sent";

    } else {

      showMessage(data.message || "Failed to send OTP","error");

      btn.disabled = false;
      btn.innerText = "Send OTP";
    }

  } catch (err) {

    console.log(err);
    showMessage("Server Error","error");

    btn.disabled = false;
    btn.innerText = "Send OTP";

  } finally {
    hideLoader();   // 🔥 IMPORTANT FIX
  }
}

/* ================= CHANGE PASSWORD ================= */

async function changePassword(){

  const email = document.getElementById("email").value.trim();
  const otp = document.getElementById("otp").value.trim();
  const newPassword = document.getElementById("newPassword").value.trim();

  if(!otp){
    showMessage("Enter OTP","error");
    return;
  }

  if(otp.length !== 6){
    showMessage("OTP must be 6 digits","error");
    return;
  }

  if(newPassword.length < 6){
    showMessage("Password must be at least 6 characters","error");
    return;
  }

  const btn = document.getElementById("changeBtn");
  btn.disabled = true;
  btn.innerText = "Processing...";

  showLoader();

  try {

    const res = await fetch("https://gsssshilla.onrender.com/reset-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        otp,
        newPassword
      })
    });

    const data = await res.json();

    if(data.success){

      showMessage("Password Changed Successfully","success");

      btn.innerText = "Success";

      setTimeout(() => {
        window.location.href = "login.html";
      }, 1200);

    } else {

      showMessage(data.message || "Invalid OTP","error");

      btn.disabled = false;
      btn.innerText = "Change Password";
    }

  } catch (err) {

    console.log(err);
    showMessage("Server Error","error");

    btn.disabled = false;
    btn.innerText = "Change Password";

  } finally {
    hideLoader();   // 🔥 FIX: ALWAYS STOP LOADER
  }
}

/* ================= ENTER KEY SUPPORT ================= */

document.addEventListener("keydown", function(e){

  if(e.key === "Enter"){

    const resetVisible =
      document.getElementById("resetSection").style.display;

    if(resetVisible === "block"){
      changePassword();
    } else {
      sendResetOTP();
    }
  }
});
</script>

</body>
</html>
