<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<style>


@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root{

  /* ========== NEW FRESH THEME ========== */
  --bg1:#071a2b;      /* midnight blue */
  --bg2:#0b2a3a;      /* deep ocean */

  --primary:#105f83;  /* aqua */
  --secondary:#00ffa3;/* neon green */
  --accent:#ffcc00;   /* gold highlight */

  --glass: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.12);

  --text:#ffffff;
  --muted:#b6c2cf;

  --shadow: 0 20px 60px rgba(0,0,0,0.6);
}

/* ================= RESET ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  background: linear-gradient(135deg,var(--bg1),var(--bg2));
  overflow:hidden;
  padding:20px;
}

/* floating neon glow */
body::before,
body::after{
  content:"";
  position:absolute;
  width:380px;
  height:380px;
  border-radius:50%;
  filter:blur(100px);
  opacity:0.35;
  z-index:0;
}

body::before{
  background:var(--primary);
  top:10%;
  left:8%;
}

body::after{
  background:var(--secondary);
  bottom:10%;
  right:8%;
}

/* ================= LOGIN BOX ================= */
.login-box{
  position:relative;
  z-index:2;

  width:100%;
  max-width:430px;

  background:var(--glass);
  border:1px solid var(--border);
  backdrop-filter:blur(18px);

  border-radius:22px;
  padding:32px;

  box-shadow:var(--shadow);

  animation:fadeUp 0.6s ease;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(30px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* ================= TITLE ================= */
.login-box h2{
  text-align:center;
  font-size:26px;
  margin-bottom:25px;

  font-weight:700;

  background: linear-gradient(90deg,var(--primary),var(--secondary),var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ================= INPUT ================= */
.input-box{
  margin-bottom:14px;
}

.input-box input{
  width:100%;
  padding:12px 14px;

  border-radius:14px;
  border:1px solid var(--border);

  background:rgba(255,255,255,0.06);
  color:var(--text);

  outline:none;
  font-size:14px;

  transition:0.3s ease;
}

.input-box input::placeholder{
  color:rgba(255,255,255,0.6);
}

.input-box input:focus{
  border-color:var(--primary);
  box-shadow:0 0 18px rgba(0,212,255,0.4);
  transform:scale(1.02);
}

/* ================= CAPTCHA ================= */
.captcha-box{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
 
}

#captchaCanvas{
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.06);
  margin-bottom: 15px;
 
}

.refresh-btn{
  width:50px;
  height:50px;

  border:none;
  border-radius:12px;

  cursor:pointer;

  background: linear-gradient(135deg,var(--primary),var(--secondary));
  color:black;
  font-weight:bold;
  margin-bottom: 15px;

  transition:0.3s;
}

.refresh-btn:hover{
  transform:rotate(90deg) scale(1.1);
}

/* ================= BUTTONS ================= */
button{
  width:100%;
  padding:12px;

  border:none;
  border-radius:14px;

  cursor:pointer;
  font-weight:600;

  color:#001018;

  transition:0.3s;
  margin-top:10px;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:yellow;
}

/* SEND OTP */
#sendOtpBtn{
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  box-shadow:0 10px 25px rgba(0,212,255,0.25);
}

/* LOGIN */
#loginBtn{
  background:linear-gradient(135deg,var(--secondary),var(--accent));
  display:none;
}

/* ================= OTP ================= */
#otpSection{
  display:none;
}

/* ================= MESSAGE ================= */
.msg{
  text-align:center;
  margin-top:12px;
  font-size:14px;
  font-weight:500;
}

.success{
  color:#00ffa3;
}

.error{
  color:#ff4d4d;
}

/* ================= FORGOT ================= */
.forgot{
  display:block;
  text-align:right;
  margin-top:10px;
  color:rgb(234, 232, 236);
  text-decoration:none;
}

.forgot:hover{
  text-shadow:0 0 10px var(--primary);
  color: rgb(44, 217, 240);
}

/* ================= LOADER ================= */
.loader-box{
  display:none;
  text-align:center;
  margin-top:15px;
}

.loader{
  width:40px;
  height:40px;

  border-radius:50%;
  border:4px solid rgba(255,255,255,0.2);
  border-top:4px solid var(--primary);
  border-bottom:4px solid var(--secondary);

  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin{
  100%{ transform:rotate(360deg); }
}

/* ================= MOBILE ================= */
@media(max-width:480px){
  .login-box{
    padding:20px;
  }

  .login-box h2{
    font-size:22px;
  }
}

</style>
</head>
<body>

<div class="login-box">

  <h2>Admin Login</h2>

  <!-- USERNAME -->

  <div class="input-box">

    <input
  type="text"
  id="username"
  placeholder="Username"
  autocomplete="off"
>

  </div>

  <!-- PASSWORD -->

  <div class="input-box">

    <input
  type="password"
  id="password"
  placeholder="Password"
  autocomplete="current-password"
>

  </div>

  <!-- CAPTCHA -->

  <div class="captcha-box">

    <canvas
      id="captchaCanvas"
      width="220"
      height="60"
    ></canvas>

    <button
      type="button"
      class="refresh-btn"
      onclick="generateCaptcha()"
    >
      ↻
    </button>

  </div>

  <!-- CAPTCHA INPUT -->

  <div class="input-box">

    <input
      type="text"
      id="captchaInput"
      placeholder="Enter Captcha"
    >

  </div>

  <!-- SEND OTP -->

  <button
    id="sendOtpBtn"
    onclick="sendOTP()"
  >
    Send OTP
  </button>

  <!-- OTP SECTION -->

  <div id="otpSection">

    <div
      class="input-box"
      style="margin-top:15px;"
    >

      <input
  type="text"
  id="otp"
  placeholder="Enter OTP"
  maxlength="6"
  autocomplete="off"
>

    </div>

    <button
      id="loginBtn"
      onclick="login()"
    >
      Login
    </button>

  </div>

  <!-- FORGOT PASSWORD -->

 <a
  href="forgot.html"
  class="forgot"
>
  Forgot Password?
</a>

  <!-- LOADER -->

  <div
    class="loader-box"
    id="loader"
  >

    <div class="loader"></div>

    <p style="color:#ffffff; font-size:14px; margin-top:10px;">
  Please wait...
</p>

  </div>

  <!-- MESSAGE -->

  <div
    class="msg"
    id="msg"
  ></div>

</div>

<script>

  let otpTimer = null;
let otpTimeLeft = 300; // 5 minutes
// ONLY check once
const token = localStorage.getItem("token");

if(token){
  window.location.replace("admin-dashboard.html");
}

  /* ================= AUTH CHECK ================= */


 window.addEventListener("DOMContentLoaded", async () => {

  const token = localStorage.getItem("token");

  if(token){
    try{

      const res = await fetch(
        "https://gsssshilla.onrender.com/verify-admin",
        {
          method:"GET",
          headers:{
            Authorization:`Bearer ${token}`
          }
        }
      );

      const data = await res.json();

      if(data.success){
        window.location.replace("admin-dashboard.html");
      }else{
        localStorage.removeItem("token");
      }

    }catch(err){
      localStorage.removeItem("token");
    }
  }

});


/* ================= CAPTCHA ================= */

let generatedCaptcha = "";

function generateCaptcha(){

  const chars =
    "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

  generatedCaptcha = "";

  for(let i = 0; i < 6; i++){

    generatedCaptcha += chars.charAt(
      Math.floor(Math.random() * chars.length)
    );

  }

  drawCaptcha(generatedCaptcha);

}

/* ================= DRAW CAPTCHA ================= */

function drawCaptcha(text){

  const canvas =
    document.getElementById("captchaCanvas");

  const ctx =
    canvas.getContext("2d");

  /* CLEAR */

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  /* BACKGROUND */

  const gradient =
    ctx.createLinearGradient(
      0,
      0,
      canvas.width,
      canvas.height
    );

  gradient.addColorStop(0,"#e2e8f0");
  gradient.addColorStop(1,"#cbd5e1");

  ctx.fillStyle = gradient;

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  /* RANDOM LINES */

  for(let i = 0; i < 8; i++){

    ctx.strokeStyle =
      `rgba(${Math.random()*255},
      ${Math.random()*255},
      ${Math.random()*255},0.7)`;

    ctx.beginPath();

    ctx.moveTo(
      Math.random() * canvas.width,
      Math.random() * canvas.height
    );

    ctx.lineTo(
      Math.random() * canvas.width,
      Math.random() * canvas.height
    );

    ctx.stroke();

  }

  /* RANDOM DOTS */

  for(let i = 0; i < 80; i++){

    ctx.fillStyle =
      `rgba(${Math.random()*255},
      ${Math.random()*255},
      ${Math.random()*255},0.8)`;

    ctx.beginPath();

    ctx.arc(
      Math.random() * canvas.width,
      Math.random() * canvas.height,
      1.5,
      0,
      Math.PI * 2
    );

    ctx.fill();

  }

  /* TEXT */

  for(let i = 0; i < text.length; i++){

    const x = 25 + i * 30;

    const y =
      35 + Math.random() * 10;

    const angle =
      (Math.random() - 0.5) * 0.6;

    ctx.save();

    ctx.translate(x,y);

    ctx.rotate(angle);

    ctx.font =
      "bold 28px Arial";

    ctx.fillStyle =
      `rgb(
        ${Math.random()*100},
        ${Math.random()*100},
        ${Math.random()*100}
      )`;

    ctx.fillText(
      text[i],
      0,
      0
    );

    ctx.restore();

  }

}

/* PAGE LOAD */

generateCaptcha();

/* ================= MESSAGE ================= */

function showMessage(text,type){

  const msg =
    document.getElementById("msg");

  msg.innerText = text;

  if(type === "success"){

    msg.className = "msg success";

  }else{

    msg.className = "msg error";

  }

}

/* ================= LOADER ================= */

function showLoader(){

  document.getElementById("loader")
    .style.display = "block";

}

function hideLoader(){

  document.getElementById("loader")
    .style.display = "none";

}

/* ================= SEND OTP ================= */

async function sendOTP(){

  const username =
    document.getElementById("username")
    .value
    .trim();

  const password =
    document.getElementById("password")
    .value
    .trim();

  const captchaInput =
    document.getElementById("captchaInput")
    .value
    .trim();

  /* VALIDATION */

  if(username === ""){

    showMessage(
      "Enter Username",
      "error"
    );

    return;
  }

  if(password.length < 8){

  showMessage(
    "Invalid 8 rule",
    "error"
  );

  return;
}

  

  if(captchaInput === ""){

    showMessage(
      "Enter Captcha",
      "error"
    );

    return;
  }

  if(
    captchaInput.toUpperCase()
    !==
    generatedCaptcha.toUpperCase()
  ){

    showMessage(
      "Wrong Captcha",
      "error"
    );

   generateCaptcha();

document.getElementById(
  "captchaInput"
).value = "";

    return;
  }

  /* BUTTON */

  const btn =
    document.getElementById("sendOtpBtn");

  btn.disabled = true;

  btn.innerText = "OTP Sending...";

  showLoader();

  try{

    const res = await fetch(

      "https://gsssshilla.onrender.com/send-otp",

      {
        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          username,
          password
        }),

        signal:AbortSignal.timeout(10000)

      }

    );

    const data =
      await res.json();

    hideLoader();

    if(data.success){
      startOtpTimer();

      showMessage(
        "OTP Sent Successfully",
        "success"
      );

      btn.innerText = "OTP Sent";

      document.getElementById("username").readOnly = true;
  document.getElementById("password").readOnly = true;

      /* SHOW OTP */

      document.getElementById("otpSection")
        .style.display = "block";

      document.getElementById("loginBtn")
        .style.display = "block";

    }else{

      btn.disabled = false;

      btn.innerText = "Send OTP";

      generateCaptcha();

      showMessage(
        data.message,
        "error"
      );

    }

  }catch(error){

    hideLoader();

    btn.disabled = false;

    btn.innerText = "Send OTP";

    showMessage(
      "Server Error, Try Again after some time!",
      "error"
    );

  }

}





function startOtpTimer(){

  otpTimeLeft = 300;

  const btn = document.getElementById("sendOtpBtn");
  btn.disabled = true;

  btn.innerText = "OTP Valid: 05:00";

  otpTimer = setInterval(() => {

    otpTimeLeft--;

    const min = String(Math.floor(otpTimeLeft / 60)).padStart(2, "0");
    const sec = String(otpTimeLeft % 60).padStart(2, "0");

    btn.innerText = `OTP Valid: ${min}:${sec}`;

    if(otpTimeLeft <= 0){
      clearInterval(otpTimer);
      resetOtpFlow();
    }

  }, 1000);
}


function resetOtpFlow(){

  const btn = document.getElementById("sendOtpBtn");

  btn.disabled = false;
  btn.innerText = "Send OTP";

  document.getElementById("otpSection").style.display = "none";
  document.getElementById("loginBtn").style.display = "none";

  document.getElementById("otp").value = "";

  showMessage("OTP expired. Please request again.", "error");

  /* CAPTCHA RESET */
  generateCaptcha();
  document.getElementById("captchaInput").value = "";
}
/* ================= LOGIN ================= */
/* ================= LOGIN ================= */



async function login(){

  const username =
    document.getElementById("username")
    .value
    .trim();

  const password =
    document.getElementById("password")
    .value
    .trim();

  const otp =
    document.getElementById("otp")
    .value
    .trim()
    .toUpperCase();

  if(otp.length !== 6){

  showMessage(
    "Invalid OTP",
    "error"
  );

  return;
}

  const btn =
    document.getElementById("loginBtn");

  btn.disabled = true;

  btn.innerText = "Please Wait...";

  showLoader();

  try{

    const res = await fetch(

      "https://gsssshilla.onrender.com/login",

      {
        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          username,
          password,
          otp
        }),

        signal:AbortSignal.timeout(10000)

      }

    );

    const data =
      await res.json();

    hideLoader();

   if(data.success){

  localStorage.setItem("token", data.token);
  
sessionStorage.removeItem("token"); // optional cleanup

  showMessage("Login Successful", "success");

  setTimeout(() => {
    window.location.replace("admin-dashboard.html");
  }, 1000);



}else{

  btn.disabled = false;

  btn.innerText = "Login";

  showMessage(
    data.message,
    "error"
  );

}

  }catch(error){

    hideLoader();

    btn.disabled = false;

    btn.innerText = "Login";

    showMessage(
      "Server Error, Try Again after some time!",
      "error"
    );

  }

}
/* ================= ENTER SUPPORT ================= */

document.addEventListener(
  "keydown",
  function(e){

    if(e.key === "Enter"){

      const otpVisible =
        document.getElementById(
          "otpSection"
        ).style.display;

      if(otpVisible === "block"){

        login();

      }else{

        sendOTP();

      }

    }

  }
);

</script>

</body>
