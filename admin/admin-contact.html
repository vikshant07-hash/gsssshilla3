
<!DOCTYPE html>
<html>
<head>
<title>Admin Contact Panel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: linear-gradient(135deg,#0f172a,#1e293b,#0b1220);
  padding:0px;
  min-height:100vh;
  color:#e5e7eb;
}

/* ================= TITLES ================= */
h2{
  text-align:center;
  margin:20px 0;
  font-size:24px;
  color:#f1f5f9;
}

/* ================= MAIN BOX ================= */
.box{
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(16px);
  border:1px solid rgba(255,255,255,0.08);

  padding:20px;
  margin:20px auto;
  border-radius:16px;

  box-shadow:0 10px 35px rgba(0,0,0,0.4);
  max-width:900px;
  width:100%;
}

/* ================= INPUT ================= */
input, textarea{
  width:100%;
  padding:12px 14px;
  margin:10px 0;

  border-radius:10px;
  border:1px solid rgba(255,255,255,0.08);

  background: rgba(255,255,255,0.05);
  color:white;

  outline:none;
  font-size:14px;
  transition:0.3s;
}

input:focus, textarea:focus{
  border-color:#38bdf8;
  box-shadow:0 0 12px rgba(56,189,248,0.3);
  transform:scale(1.02);
}

/* ================= BUTTON ================= */
button{
  padding:10px 18px;
  border:none;
  background: linear-gradient(135deg,#38bdf8,#6366f1);
  color:white;
  border-radius:10px;
  cursor:pointer;
  font-weight:500;
  transition:0.3s;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(56,189,248,0.4);
}

/* DELETE BUTTON */
.delete-btn{
  background: linear-gradient(135deg,#ef4444,#dc2626);
  padding:8px 12px;
  border-radius:8px;
  font-size:13px;
}

/* ================= TABLE (desktop fallback) ================= */
table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#1e293b;
  color:white;
  padding:12px;
}

td{
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* ================= HOVER ================= */
tr:hover{
  background:rgba(255,255,255,0.05);
}

/* ================= RESPONSIVE TABLE ================= */
@media (max-width:768px){

  table, thead, tbody, th, td, tr{
    display:block;
    width:100%;
  }

  tr{
    margin-bottom:15px;
    background: rgba(255,255,255,0.06);
    border-radius:12px;
    padding:10px;
  }

  th{
    display:none;
  }

  td{
    display:flex;
    justify-content:space-between;
    padding:8px;
    border:none;
  }

  td::before{
    content:attr(data-label);
    color:#94a3b8;
    font-weight:600;
  }
}

/* ================= MESSAGE GRID ================= */
#msgContainer{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:16px;
  margin-top:20px;
}

/* ================= MESSAGE CARD ================= */
.msg-card{
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(14px);

  padding:16px;
  border-radius:14px;

  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 10px 25px rgba(0,0,0,0.25);

  position:relative;
  overflow:hidden;

  transition:0.35s ease;
}

/* 🔥 VERTICAL HOVER EFFECT */
.msg-card:hover{
  transform: translateY(-10px);
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

/* LIGHT SWIPE EFFECT */
.msg-card::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;

  background: linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.08),
    transparent
  );

  transition:0.5s;
}

.msg-card:hover::before{
  left:100%;
}

/* TEXT */
.msg-card h4{
  font-size:15px;
  color:#ffffff;
  margin-bottom:5px;
}

.msg-card small{
  color:#94a3b8;
  display:block;
  margin-bottom:10px;
}

.msg-card p{
  font-size:14px;
  color:#e2e8f0;
  margin-bottom:10px;
  line-height:1.5;
}

/* TIME */
.msg-time{
  font-size:12px;
  color:#94a3b8;

  display:flex;
  justify-content:space-between;

  margin-top:10px;
  padding-top:8px;

  border-top:1px solid rgba(255,255,255,0.08);
}

/* BUTTON INSIDE CARD */
.msg-card button{
  margin-top:10px;
  background: linear-gradient(135deg,#ef4444,#dc2626);
  padding:8px 12px;
  border-radius:8px;
  font-size:13px;
}

#msgContainer{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:16px;
  margin-top:20px;
}

/* ================= CARD ================= */
.msg-card{
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(14px);

  padding:16px;
  border-radius:14px;

  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 10px 25px rgba(0,0,0,0.25);

  position:relative;
  overflow:hidden;

  transition:0.3s ease;

  /* IMPORTANT FIX */
  min-height:160px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* HOVER EFFECT */
.msg-card:hover{
  transform: translateY(-8px);
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

/* LIGHT SWIPE */
.msg-card::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;

  background: linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.08),
    transparent
  );

  transition:0.5s;
}

.msg-card:hover::before{
  left:100%;
}

/* TEXT */
.msg-card h4{
  font-size:15px;
  color:#fff;
  margin-bottom:4px;

  word-break:break-word;
}

.msg-card small{
  color:#94a3b8;
  font-size:12px;

  word-break:break-word;
}

.msg-card p{
  font-size:14px;
  color:#e2e8f0;
  margin:10px 0;

  line-height:1.5;

  word-break:break-word;
}

/* TIME */
.msg-time{
  font-size:12px;
  color:#94a3b8;

  display:flex;
  justify-content:space-between;
  gap:10px;

  margin-top:10px;
  padding-top:8px;

  border-top:1px solid rgba(255,255,255,0.08);
}

/* BUTTON */
.msg-card button{
  margin-top:10px;
  width:100%;

  background: linear-gradient(135deg,#ef4444,#dc2626);
  padding:8px 12px;

  border-radius:8px;
  font-size:13px;
}

/* ================= MOBILE FIX ================= */
@media (max-width:768px){

  #msgContainer{
    grid-template-columns:1fr;
  }

  .msg-card{
    padding:14px;
    min-height:auto;
  }

  .msg-time{
    flex-direction:column;
    align-items:flex-start;
    gap:5px;
  }
}



/* Mobile */

@media (max-width:768px){


    .admin-notice{
        padding-top:75px;
        padding-left:12px;
        padding-right:12px;
    }

    .notice-tools{
        margin-top:25px;
    }
}


/* ===================================
   PROFESSIONAL ADMIN NAVBAR
=================================== */

.navbar{
    width:100%;
    position:sticky;
    top:0;
    z-index:9999;

    display:flex;
    align-items:center;
    justify-content:space-between;

    background:linear-gradient(
        135deg,
        #081C45,
        #123A7A
    );

    padding:14px 25px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.15);

    margin-bottom:25px;
}

/* Logo */

.logo-section{
    display:flex;
    align-items:center;
    gap:14px;
}

.school-logo{
    width:55px;
    height:55px;

    border-radius:50%;
    object-fit:cover;

    border:3px solid #D4AF37;

    background:#fff;
}

.school-info{
    display:flex;
    flex-direction:column;
}

.school-info h2{
    color:#fff;
    font-size:18px;
    font-weight:700;
    line-height:1.2;
}

.school-info span{
    color:#D4AF37;
    font-size:12px;
    font-weight:500;
}

/* Nav */

.nav-menu{
    display:flex;
    align-items:center;
    gap:8px;
}

.nav-menu a{
    text-decoration:none;

    color:#dbeafe;

    padding:11px 15px;

    border-radius:10px;

    font-size:14px;
    font-weight:600;

    transition:.3s;
}

.nav-menu a:hover{
    background:rgba(212,175,55,.15);
    color:#fff;
}

.nav-menu a.active{
    background:#D4AF37;
    color:#081C45;
}

/* Logout */

.logout-btn{
    margin-left:10px;

    border:none;

    background:linear-gradient(
        135deg,
        #D4AF37,
        #F5D76E
    );

    color:#081C45;

    padding:11px 22px;

    border-radius:50px;

    font-size:14px;
    font-weight:700;

    cursor:pointer;

    transition:.3s;
}

.logout-btn:hover{
    transform:translateY(-2px);

    box-shadow:
    0 8px 20px rgba(212,175,55,.35);
}

/* Mobile Menu Button */

.mobile-menu-btn{
    display:none;

    color:#fff;

    font-size:28px;

    cursor:pointer;
}

/* ===================================
   TABLET
=================================== */

@media(max-width:1200px){

    .school-info h2{
        font-size:16px;
    }

    .nav-menu a{
        padding:10px 12px;
        font-size:13px;
    }

}

/* ===================================
   MOBILE
=================================== */

@media(max-width:950px){

    .mobile-menu-btn{
        display:block;
    }

    .nav-menu{

        position:absolute;

        top:100%;

        left:0;
        right:0;

        background:#081C45;

        flex-direction:column;

        padding:15px;

        gap:5px;

        display:none;

        box-shadow:
        0 15px 30px rgba(0,0,0,.2);
    }

    .nav-menu.active{
        display:flex;
    }

    .nav-menu a{
        width:100%;
        text-align:left;
    }

    .logout-btn{
        width:100%;
        margin:10px 0 0;
    }

}

/* ===================================
   SMALL MOBILE
=================================== */

@media(max-width:600px){

    .navbar{
        padding:12px 15px;
    }

    .school-logo{
        width:45px;
        height:45px;
    }

    .school-info h2{
        font-size:14px;
    }

    .school-info span{
        font-size:11px;
    }

}

/* ===================================
   EXTRA SMALL
=================================== */

@media(max-width:450px){

    .school-info h2{
        font-size:13px;
    }

    .school-info span{
        display:none;
    }

}




/* ===================================
   PROFESSIONAL ADMIN NAVBAR
=================================== */



</style>
</head>

<body>

 <header class="navbar">

    <!-- Left Logo -->
    <div class="logo-section">

        <img src="../1778132110413-ChatGPT Image May 7, 2026, 10_56_26 AM.png" alt="School Logo" class="school-logo">

        <div class="school-info">
            <h2>Govt. Sr. Sec. School Shilla</h2>
            
        </div>

    </div>

    <!-- Mobile Menu -->
    <div class="mobile-menu-btn" id="menuToggle">
        ☰
    </div>

    <!-- Nav -->
    <nav class="nav-menu" id="navLinks">

        <a href="admin-dashboard.html">Dashboard</a>

        <a href="add-image.html">
            Gallery
        </a>

        <a href="admin-img.html">
            Home Slider
        </a>

        <a href="admin-faculity.html">
            Faculty
        </a>

        <a href="admin-notif.html">
            Notifications
        </a>

        <a href="admin-downl.html">
            Downloads
        </a>

        <a href="admin-contact.html" class="active">
            Contact
        </a>

       

        <button class="logout-btn" onclick="logout()">
            Logout
        </button>

    </nav>

</header>

<h2>📞 Contact Settings</h2>

<div class="box">
  <input type="text" id="school_name" placeholder="School Name">
  <textarea id="address" placeholder="Address"></textarea>
  <input type="text" id="phone" placeholder="Phone">
  <input type="email" id="email" placeholder="Email">

  <button onclick="updateInfo()">Update</button>
</div>

<h2>📩 Messages</h2>

<div class="box">
  <div id="msgContainer">
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Message</th>
      <th>Action</th>
    </tr>
  
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

// ✅ Token globally define karo, localStorage se
const token = localStorage.getItem("token");

if (!token) {
  window.location.replace("login.html");
}

// Auth verify (optional double-check)
fetch("https://gsssshilla.onrender.com/verify-admin", {
  headers: { Authorization: `Bearer ${token}` }
})
.then(res => res.json())
.then(data => {
  if (!data.success) {
    localStorage.removeItem("token");
    window.location.replace("login.html");
  }
})
.catch(() => {
  localStorage.removeItem("token");
  window.location.replace("login.html");
});

const menuToggle = document.getElementById("menuToggle");
const navLinks = document.getElementById("navLinks");

menuToggle.addEventListener("click", () => {

    navLinks.classList.toggle("active");

    menuToggle.innerHTML =
    navLinks.classList.contains("active")
    ? "✕"
    : "☰";

});

function logout(){

    const navLinks = document.getElementById("navLinks");
    const menuToggle = document.getElementById("menuToggle");

    navLinks.classList.remove("active");

    if(menuToggle){
        menuToggle.innerHTML = "☰";
    }

    Swal.fire({
        title: "Logout?",
        text: "Do you really want to logout from Admin Panel?",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#D4AF37",
        cancelButtonColor: "#123A7A",
        confirmButtonText: "Yes, Logout",
        cancelButtonText: "Cancel"
    }).then((result) => {

        if(result.isConfirmed){

            localStorage.removeItem("token");
            sessionStorage.clear();

            window.location.replace("login.html");
        }

    });

}

// LOAD INFO
async function loadInfo(){
  const res = await fetch("https://gsssshilla.onrender.com/admin/contact/info");
  const data = await res.json();

  document.getElementById("school_name").value = data.school_name;
  document.getElementById("address").value = data.address;
  document.getElementById("phone").value = data.phone;
  document.getElementById("email").value = data.email;
}

// UPDATE INFO
async function updateInfo(){
  const data = {
    school_name:document.getElementById("school_name").value,
    address:document.getElementById("address").value,
    phone:document.getElementById("phone").value,
    email:document.getElementById("email").value
  };

  const res = await fetch("https://gsssshilla.onrender.com/admin/contact/update",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  const result = await res.json();
  alert(result.message);
}

async function loadMessages(){
  const res = await fetch("https://gsssshilla.onrender.com/admin/contact/messages");
  const data = await res.json();

  const container = document.getElementById("msgContainer");
  container.innerHTML = "";

  data.forEach(msg => {

    const dateObj = new Date(msg.created_at || Date.now());

    const date = dateObj.toLocaleDateString();
    const time = dateObj.toLocaleTimeString();

    const card = `
      <div class="msg-card">

        <h4>${msg.name}</h4>
        <small>📧 ${msg.email}</small>

        <p>${msg.message}</p>

        <div class="msg-time">
          <span>📅 ${date}</span>
          <span>⏰ ${time}</span>
        </div>

        <button onclick="deleteMsg(${msg.id})">
          Delete
        </button>

      </div>
    `;

    container.innerHTML += card;
  });
}

// DELETE
async function deleteMsg(id){
  await fetch(`https://gsssshilla.onrender.com/admin/contact/delete/${id}`,{
    method:"DELETE"
  });

  location.reload();
}

// INIT
loadInfo();
loadMessages();

</script>

</body>
</html>
